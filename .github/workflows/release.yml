name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    # SpeechAnalyzer + FoundationModels are macOS-26-only, so the build SDK
    # must be macOS 26+. If GitHub-hosted macos-26 isn't available to your
    # account tier, switch to a self-hosted runner with Xcode 26.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build .app (ad-hoc signed)
        run: ./build.sh

      - name: Verify signature
        run: codesign -dvvv Recorder.app

      - name: Package
        id: package
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          NAME="Recorder-${TAG}.zip"
          ditto -c -k --sequesterRsrc --keepParent Recorder.app "$NAME"
          shasum -a 256 "$NAME" | tee "${NAME}.sha256"
          echo "zip=$NAME" >> "$GITHUB_OUTPUT"
          echo "sha=${NAME}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Recorder-app
          path: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.sha }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.sha }}
          generate_release_notes: true
          body: |
            Ad-hoc signed build — macOS will warn the first time you open it.

            **Install:**
            1. Download the `.zip`, unzip → `Recorder.app`
            2. Move to `/Applications` (or wherever you like)
            3. Right-click `Recorder.app` → **Open** → confirm in the dialog
            4. Grant Microphone, Screen Recording, Speech Recognition when prompted

            **Verify integrity:** the `.sha256` file next to the zip contains its checksum.
